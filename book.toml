[book]
title = "LibreMatch Documentation"
authors = ["simonsan", "LibreMatch Contributors"]
description = "Documentation for LibreMatch - A community-driven API for Age of Empires game data"
language = "en"
src = "src"

[build]
build-dir = "book"
create-missing = false

[preprocessor.links]

[preprocessor.index]

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
smart-punctuation = true
no-section-label = false
additional-css = ["static/custom.css"]
additional-js = []
git-repository-url = "https://github.com/librematch/wiki"
edit-url-template = "https://github.com/librematch/wiki/edit/main/{path}"
cname = "wiki.librematch.org"

[output.html.fold]
enable = true
level = 1

[output.html.playground]
editable = false
copyable = true
copy-js = true
line-numbers = true

[output.html.code]
hidelines = { python = "~", rust = "#" }

[output.html.search]
enable = true
limit-results = 30
teaser-word-count = 30
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3
copy-js = true
